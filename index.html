<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MindVault Logo Forge</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Orbitron:wght@600&family=Bebas+Neue&family=Oswald&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>

/* BASE */
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f0f0f;
  color:white;
}

header{
  text-align:center;
  padding:15px;
}

/* LAYOUT PADRÃO (PC) */
.container{
  display:flex;
  height:calc(100vh - 80px);
}

.controls{
  width:320px;
  overflow-y:auto;
  padding:15px;
  background:#181818;
}

.preview{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#111;
}

canvas{
  max-width:100%;
  height:auto;
  border-radius:10px;
}

/* INPUTS */
input, select, button{
  width:100%;
  padding:10px;
  margin-top:5px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
}

button{
  background:#00ffaa;
  font-weight:bold;
  cursor:pointer;
}

/* MOBILE DE VERDADE (não essa tentativa anterior) */
@media (max-width:768px){

  .container{
    flex-direction:column;
    height:100vh;
  }

  /* PREVIEW FIXO EM CIMA */
  .preview{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:40vh;
    z-index:10;
  }

  canvas{
    width:90%;
  }

  /* CONTROLES ROLANDO EMBAIXO */
  .controls{
    position:absolute;
    top:40vh;
    width:100%;
    height:60vh;
    overflow-y:auto;
    border-top:2px solid #222;
  }

  header{
    font-size:0.9rem;
  }

}

</style>

</head>

<body>

<header>
<h1>MindVault</h1>
<p>Crie Logos Profissionais</p>
</header>

<div class="container">

<div class="preview">
<canvas id="canvas" width="700" height="400"></canvas>
</div>

<div class="controls">

<h2>Configurações</h2>

<label>Nome Principal</label>
<input id="nome" type="text" placeholder="Nome da marca">

<label>Texto Secundário</label>
<input id="nome2" type="text" placeholder="Ex: Studio, Company, Tech...">

<label>Cor do Logo</label>
<input id="cor" type="color" value="#00ffaa">

<label>Estilo</label>
<select id="estilo">
<option value="normal">Normal</option>
<option value="neon">Neon</option>
<option value="shadow">Sombra</option>
<option value="3d">3D</option>
<option value="outline">Outline</option>
</select>

<label>Fonte</label>
<select id="fonte">
<option value="Arial">Arial</option>
<option value="Verdana">Verdana</option>
<option value="Courier New">Courier</option>
<option value="Georgia">Georgia</option>
<option value="Impact">Impact</option>
<option value="Montserrat">Montserrat</option>
<option value="Orbitron">Orbitron</option>
<option value="Bebas Neue">Bebas Neue</option>
<option value="Oswald">Oswald</option>
</select>

<label>Ícone</label>
<select id="icone">
<option value="nenhum">Nenhum</option>
<option value="estrela">Estrela</option>
<option value="círculo">Círculo</option>
<option value="triângulo">Triângulo</option>
<option value="diamante">Diamante</option>
</select>

<label>Cor de Fundo</label>
<input id="bgcolor" type="color" value="#111111">

<label>Cor Fundo 1</label>
<input id="bgcolor1" type="color" value="#111111">

<label>Cor Fundo 2</label>
<input id="bgcolor2" type="color" value="#111111">

<label>Ângulo do Fundo</label>
<input type="range" id="bgangle" min="0" max="360" value="60">

<button onclick="gerarLogo()">Gerar Logo</button>
<button onclick="baixarLogo()">Baixar PNG</button>
<button onclick="logoAleatorio()">Logo Aleatório</button>

<div id="variacoes"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
