<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MindVault Logo Forge</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Orbitron:wght@600&family=Bebas+Neue&family=Oswald&display=swap" rel="stylesheet">

<style>

/* BASE */
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f0f0f;
  color:white;
  overflow:hidden;
}

/* HEADER */
header{
  text-align:center;
  padding:10px;
}

/* PREVIEW FIXO */
.preview{
  position:fixed;
  top:0;
  width:100%;
  height:50vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#111;
  z-index:10;
}

canvas{
  width:90%;
  max-width:600px;
  border-radius:12px;
  touch-action:none;
  transition:transform 0.1s;
}

/* CONTROLES */
.controls{
  position:absolute;
  bottom:0;
  width:100%;
  height:50vh;
  background:#181818;
  overflow-y:auto;
  padding:15px;
  border-radius:20px 20px 0 0;
}

/* INPUTS */
input, select, button{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:10px;
}

button{
  background:#00ffaa;
  font-weight:bold;
}

/* HANDLE */
.handle{
  width:60px;
  height:5px;
  background:#555;
  margin:0 auto 15px;
  border-radius:10px;
}

</style>

</head>

<body>

<header>
<h2>MindVault</h2>
</header>

<!-- PREVIEW -->
<div class="preview">
<canvas id="canvas" width="700" height="400"></canvas>
</div>

<!-- CONTROLES -->
<div class="controls">

<div class="handle"></div>

<input id="nome" placeholder="Nome da marca">
<input id="nome2" placeholder="Texto secundário">

<input id="cor" type="color" value="#00ffaa">

<select id="estilo">
<option value="normal">Normal</option>
<option value="neon">Neon</option>
<option value="shadow">Sombra</option>
<option value="3d">3D</option>
<option value="outline">Outline</option>
</select>

<select id="fonte">
<option>Arial</option>
<option>Montserrat</option>
<option>Orbitron</option>
<option>Bebas Neue</option>
<option>Oswald</option>
</select>

<select id="icone">
<option value="nenhum">Nenhum</option>
<option value="estrela">Estrela</option>
<option value="círculo">Círculo</option>
<option value="triângulo">Triângulo</option>
<option value="diamante">Diamante</option>
</select>

<input id="bgcolor" type="color" value="#111111">
<input id="bgcolor1" type="color" value="#111111">
<input id="bgcolor2" type="color" value="#111111">

<label>Tamanho / Zoom</label>
<input type="range" id="zoom" min="0.5" max="3" step="0.01" value="1">

<input type="range" id="bgangle" min="0" max="360" value="60">

<button onclick="gerarLogo()">Gerar Logo</button>
<button onclick="baixarLogo()">Baixar PNG</button>
<button onclick="logoAleatorio()">Logo Aleatório</button>

</div>

<script src="script.js"></script>

<script>

/* CONTROLE DE MOVIMENTO + ZOOM */

const canvas = document.getElementById("canvas")
const zoomControl = document.getElementById("zoom")

let scale = 1
let posX = 0
let posY = 0

let startX = 0
let startY = 0

/* DRAG */
canvas.addEventListener("touchstart", (e)=>{
  startX = e.touches[0].clientX
  startY = e.touches[0].clientY
})

canvas.addEventListener("touchmove", (e)=>{
  e.preventDefault()

  let dx = e.touches[0].clientX - startX
  let dy = e.touches[0].clientY - startY

  posX += dx
  posY += dy

  startX = e.touches[0].clientX
  startY = e.touches[0].clientY

  updateTransform()

}, { passive:false })

/* ZOOM SLIDER */
zoomControl.addEventListener("input", ()=>{
  scale = parseFloat(zoomControl.value)
  updateTransform()
})

function updateTransform(){
  canvas.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`
}

</script>

</body>
</html>
