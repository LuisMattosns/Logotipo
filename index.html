<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MindVault Logo Forge</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Orbitron:wght@600&family=Bebas+Neue&family=Oswald&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>

/* RESPONSIVO (mantido, só melhorei o canvas de leve) */
@media (max-width: 768px){

  .container{
    flex-direction: column;
  }

  .controls{
    width: 100%;
  }

  .preview{
    width: 100%;
    margin-top: 20px;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
  }

  canvas{
    width: 100%;
    height: auto;
    touch-action: none; /* ESSENCIAL pro touch funcionar */
  }

  header h1{
    font-size: 1.8rem;
  }

  header p{
    font-size: 0.9rem;
  }

  input, select, button{
    width: 100%;
    margin-bottom: 10px;
  }
}

</style>

</head>

<body>

<header>
<h1>MindVault</h1>
<p>Crie Logos Profissionais</p>
</header>

<div class="container">

<div class="controls">

<h2>Configurações</h2>

<label>Nome Principal</label>
<input id="nome" type="text" placeholder="Nome da marca">

<label>Texto Secundário</label>
<input id="nome2" type="text" placeholder="Ex: Studio, Company, Tech...">

<label>Cor do Logo</label>
<input id="cor" type="color" value="#00ffaa">

<label>Estilo</label>
<select id="estilo">
<option value="normal">Normal</option>
<option value="neon">Neon</option>
<option value="shadow">Sombra</option>
<option value="3d">3D</option>
<option value="outline">Outline</option>
</select>

<label>Fonte</label>
<select id="fonte">
<option value="Arial">Arial</option>
<option value="Verdana">Verdana</option>
<option value="Courier New">Courier</option>
<option value="Georgia">Georgia</option>
<option value="Impact">Impact</option>
<option value="Montserrat">Montserrat</option>
<option value="Orbitron">Orbitron</option>
<option value="Bebas Neue">Bebas Neue</option>
<option value="Oswald">Oswald</option>
</select>

<label>Ícone</label>
<select id="icone">
<option value="nenhum">Nenhum</option>
<option value="estrela">Estrela</option>
<option value="círculo">Círculo</option>
<option value="triângulo">Triângulo</option>
<option value="diamante">Diamante</option>
</select>

<label>Cor de Fundo</label>
<input id="bgcolor" type="color" value="#111111">

<label>Cor Fundo 1</label>
<input id="bgcolor1" type="color" value="#111111">

<label>Cor Fundo 2</label>
<input id="bgcolor2" type="color" value="#111111">

<label>Ângulo do Fundo</label>
<input type="range" id="bgangle" min="0" max="360" value="60">

<button onclick="gerarLogo()">Gerar Logo</button>
<button onclick="baixarLogo()">Baixar PNG</button>
<button onclick="logoAleatorio()">Logo Aleatório</button>

</div>

<div class="preview">
<canvas id="canvas" width="700" height="400"></canvas>
<div id="variacoes"></div>
</div>

</div>

<script src="script.js"></script>

<script>

/* TOUCH REAL (sem gambiarra quebrada) */

const canvas = document.getElementById("canvas")

let scale = 1
let posX = 0
let posY = 0

let startX = 0
let startY = 0
let lastDistance = null

function getDistance(touches){
  const dx = touches[0].clientX - touches[1].clientX
  const dy = touches[0].clientY - touches[1].clientY
  return Math.sqrt(dx*dx + dy*dy)
}

function updateTransform(){
  canvas.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`
}

/* TOQUE INICIAL */
canvas.addEventListener("touchstart", (e)=>{

  if(e.touches.length === 1){
    startX = e.touches[0].clientX - posX
    startY = e.touches[0].clientY - posY
  }

  if(e.touches.length === 2){
    lastDistance = getDistance(e.touches)
  }

}, { passive:false })

/* MOVIMENTO */
canvas.addEventListener("touchmove", (e)=>{

  e.preventDefault()

  if(e.touches.length === 1){
    posX = e.touches[0].clientX - startX
    posY = e.touches[0].clientY - startY
  }

  if(e.touches.length === 2){
    const dist = getDistance(e.touches)

    if(lastDistance){
      let delta = dist - lastDistance
      scale += delta * 0.005
      scale = Math.max(0.5, Math.min(scale, 3))
    }

    lastDistance = dist
  }

  updateTransform()

}, { passive:false })

canvas.addEventListener("touchend", ()=>{
  lastDistance = null
})

</script>

</body>
</html>
