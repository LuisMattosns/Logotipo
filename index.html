<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MindVault Logo Forge</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Orbitron:wght@600&family=Bebas+Neue&family=Oswald&display=swap" rel="stylesheet">

<style>

/* BASE */
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f0f0f;
  color:white;
  overflow:hidden;
}

header{
  text-align:center;
  padding:10px;
  font-size:14px;
}

/* PREVIEW FULL */
.preview{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:55vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#111;
  z-index:10;
}

canvas{
  width:90%;
  max-width:600px;
  border-radius:12px;
}

/* CONTROLES */
.controls{
  position:absolute;
  bottom:0;
  width:100%;
  height:45vh;
  background:#181818;
  overflow-y:auto;
  padding:15px;
  border-top-left-radius:20px;
  border-top-right-radius:20px;
}

/* INPUTS */
input, select, button{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:10px;
}

button{
  background:#00ffaa;
  font-weight:bold;
}

/* DRAG HANDLE (estilo app) */
.handle{
  width:60px;
  height:5px;
  background:#555;
  border-radius:10px;
  margin:0 auto 15px;
}

</style>

</head>

<body>

<header>
<h2>MindVault</h2>
</header>

<div class="preview">
<canvas id="canvas" width="700" height="400"></canvas>
</div>

<div class="controls">
<div class="handle"></div>

<h3>Configurações</h3>

<input id="nome" placeholder="Nome da marca">
<input id="nome2" placeholder="Texto secundário">

<input id="cor" type="color" value="#00ffaa">

<select id="estilo">
<option value="normal">Normal</option>
<option value="neon">Neon</option>
<option value="shadow">Sombra</option>
<option value="3d">3D</option>
<option value="outline">Outline</option>
</select>

<select id="fonte">
<option>Arial</option>
<option>Montserrat</option>
<option>Orbitron</option>
<option>Bebas Neue</option>
<option>Oswald</option>
</select>

<select id="icone">
<option value="nenhum">Nenhum</option>
<option value="estrela">Estrela</option>
<option value="círculo">Círculo</option>
<option value="triângulo">Triângulo</option>
<option value="diamante">Diamante</option>
</select>

<input id="bgcolor" type="color" value="#111111">
<input id="bgcolor1" type="color" value="#111111">
<input id="bgcolor2" type="color" value="#111111">

<input type="range" id="bgangle" min="0" max="360" value="60">

<button onclick="gerarLogo()">Gerar Logo</button>
<button onclick="baixarLogo()">Baixar PNG</button>
<button onclick="logoAleatorio()">Logo Aleatório</button>

</div>

<script src="script.js"></script>

<script>

/* SUPORTE TOUCH + ZOOM (o que tava faltando na tua vida) */

const canvas = document.getElementById("canvas")

let scale = 1
let posX = 0
let posY = 0

let lastDistance = null

function getDistance(touches){
  let dx = touches[0].clientX - touches[1].clientX
  let dy = touches[0].clientY - touches[1].clientY
  return Math.sqrt(dx*dx + dy*dy)
}

/* ARRASTAR */
canvas.addEventListener("touchmove", function(e){

  if(e.touches.length === 1){

    posX += e.touches[0].movementX || 0
    posY += e.touches[0].movementY || 0

    canvas.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`
  }

  /* PINCH ZOOM */
  if(e.touches.length === 2){

    let dist = getDistance(e.touches)

    if(lastDistance){
      if(dist > lastDistance) scale += 0.02
      else scale -= 0.02
    }

    lastDistance = dist

    canvas.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`
  }

})

canvas.addEventListener("touchend", ()=>{
  lastDistance = null
})

</script>

</body>
</html>
