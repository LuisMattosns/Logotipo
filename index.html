<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MindVault Logo Forge</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Orbitron:wght@600&family=Bebas+Neue&family=Oswald&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

/* ================= MOBILE APP STYLE ================= */
@media (max-width:768px){

  body{
    overflow:hidden;
  }

  .container{
    flex-direction:column;
  }

  /* PREVIEW FIXO */
  .preview{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:45vh;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:10;
  }

  canvas{
    width:90%;
    touch-action:none;
  }

  /* CONTROLES */
  .controls{
    position:absolute;
    bottom:0;
    width:100%;
    height:55vh;
    overflow-y:auto;
    background:#181818;
    padding:15px;
    border-top-left-radius:20px;
    border-top-right-radius:20px;
  }

}

</style>

</head>

<body>

<header>
<h1>MindVault</h1>
<p>Crie Logos Profissionais</p>
</header>

<div class="container">

<div class="controls">

<h2>Configurações</h2>

<input id="nome" placeholder="Nome da marca">
<input id="nome2" placeholder="Texto secundário">

<input id="cor" type="color" value="#00ffaa">

<select id="estilo">
<option value="normal">Normal</option>
<option value="neon">Neon</option>
<option value="shadow">Sombra</option>
<option value="3d">3D</option>
<option value="outline">Outline</option>
</select>

<select id="fonte">
<option>Arial</option>
<option>Montserrat</option>
<option>Orbitron</option>
<option>Bebas Neue</option>
<option>Oswald</option>
</select>

<button onclick="gerarLogo()">Gerar Logo</button>
<button onclick="baixarLogo()">Baixar PNG</button>
<button onclick="logoAleatorio()">Logo Aleatório</button>

</div>

<div class="preview">
<canvas id="canvas" width="700" height="400"></canvas>
</div>

</div>

<script src="script.js"></script>

<script>

/* ================= SISTEMA TOUCH REAL ================= */

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

let selected = null

let textos = [
  { id:"main", texto:"NOME", x:350, y:180, size:60 },
  { id:"sub", texto:"SUB", x:350, y:250, size:30 }
]

/* SINCRONIZA INPUT */
document.getElementById("nome").addEventListener("input", e=>{
  textos[0].texto = e.target.value || "NOME"
  draw()
})

document.getElementById("nome2").addEventListener("input", e=>{
  textos[1].texto = e.target.value || "SUB"
  draw()
})

/* DESENHAR */
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height)

  textos.forEach(t=>{
    ctx.font = t.size + "px Arial"
    ctx.fillStyle = document.getElementById("cor").value
    ctx.textAlign = "center"
    ctx.fillText(t.texto, t.x, t.y)
  })
}

/* DETECTAR TEXTO */
function getTouchedText(x,y){
  for(let t of textos){
    let width = ctx.measureText(t.texto).width
    let height = t.size

    if(
      x > t.x - width/2 &&
      x < t.x + width/2 &&
      y > t.y - height &&
      y < t.y
    ){
      return t
    }
  }
  return null
}

/* TOUCH */
let startDist = null

canvas.addEventListener("touchstart", e=>{

  const rect = canvas.getBoundingClientRect()
  const x = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width)
  const y = (e.touches[0].clientY - rect.top) * (canvas.height / rect.height)

  selected = getTouchedText(x,y)

  if(e.touches.length === 2){
    startDist = getDist(e)
  }

}, {passive:false})

canvas.addEventListener("touchmove", e=>{

  e.preventDefault()

  if(!selected) return

  const rect = canvas.getBoundingClientRect()

  /* MOVER */
  if(e.touches.length === 1){
    selected.x = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width)
    selected.y = (e.touches[0].clientY - rect.top) * (canvas.height / rect.height)
  }

  /* ZOOM */
  if(e.touches.length === 2){

    let newDist = getDist(e)

    if(startDist){
      let diff = newDist - startDist
      selected.size += diff * 0.1
      selected.size = Math.max(10, selected.size)
    }

    startDist = newDist
  }

  draw()

}, {passive:false})

canvas.addEventListener("touchend", ()=>{
  selected = null
  startDist = null
})

function getDist(e){
  let dx = e.touches[0].clientX - e.touches[1].clientX
  let dy = e.touches[0].clientY - e.touches[1].clientY
  return Math.sqrt(dx*dx + dy*dy)
}

/* INICIAL */
draw()

</script>

</body>
</html>
