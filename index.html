<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MindVault Logo Forge</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Orbitron:wght@600&family=Bebas+Neue&family=Oswald&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>
@media (max-width:768px){

  body{ overflow:hidden; }

  .container{ flex-direction:column; }

  .preview{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:45vh;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:10;
  }

  canvas{
    width:90%;
    touch-action:none;
  }

  .controls{
    position:absolute;
    bottom:0;
    width:100%;
    height:55vh;
    overflow-y:auto;
    background:#181818;
    padding:15px;
    border-top-left-radius:20px;
    border-top-right-radius:20px;
  }

}
</style>

</head>

<body>

<header>
<h1>MindVault</h1>
<p>Crie Logos Profissionais</p>
</header>

<div class="container">

<div class="controls">

<h2>Configurações</h2>

<input id="nome" placeholder="Nome da marca">
<input id="nome2" placeholder="Texto secundário">

<label>Cor do texto</label>
<input id="cor" type="color" value="#00ffaa">

<label>Cor de fundo</label>
<input id="bgcolor" type="color" value="#111111">

<select id="estilo">
<option value="normal">Normal</option>
<option value="neon">Neon</option>
<option value="shadow">Sombra</option>
<option value="3d">3D</option>
<option value="outline">Outline</option>
</select>

<select id="fonte">
<option>Arial</option>
<option>Montserrat</option>
<option>Orbitron</option>
<option>Bebas Neue</option>
<option>Oswald</option>
</select>

<select id="icone">
<option value="nenhum">Sem ícone</option>
<option value="estrela">Estrela</option>
<option value="coroa">Coroa</option>
<option value="diamante">Diamante</option>
<option value="triangulo">Triângulo</option>
<option value="circulo">Círculo</option>
<option value="lampada">Lâmpada</option>
</select>

<button onclick="gerarLogo()">Gerar Logo</button>
<button onclick="baixarLogo()">Baixar Logo</button>

</div>

<div class="preview">
<canvas id="canvas" width="700" height="400"></canvas>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
